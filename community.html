<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Posts</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial,sans-serif;max-width:900px;margin:0 auto;padding:20px;background:#f5f5f5}
.card{background:#fff;padding:16px;border-radius:12px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
textarea{width:100%;min-height:100px;padding:10px}
button{padding:10px 16px;cursor:pointer}
.post{border-top:1px solid #ddd;padding:12px 0}
.small{color:#666;font-size:.9em}
</style>
</head>
<body>
<h1>Community</h1>

<div class="card">
  <h3>Create Post</h3>
  <textarea id="postText" placeholder="Share something..."></textarea><br><br>
  <button onclick="submitPost()">Post</button>
  <p id="msg"></p>
</div>

<div class="card">
  <h3>Posts</h3>
  <div id="feed"></div>
</div>

<script>
const supabaseUrl = "https://trglbtbmnpjlxebnsvhg.supabase.co";
const supabaseKey = "sb_publishable_eFrkhbnP4_1ZBgSJ9i2UFg_uDdNRgR2";
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

const badWords = ["fuck","shit","bitch","asshole","bastard","cunt","nigger"];

function containsBadWords(text){
  const lower = text.toLowerCase();
  return badWords.some(w => lower.includes(w));
}

async function submitPost(){
  const text = document.getElementById("postText").value.trim();
  const msg = document.getElementById("msg");

  if(!text){
    msg.textContent = "Enter a post.";
    return;
  }

  if(containsBadWords(text)){
    msg.textContent = "Post blocked: inappropriate language detected.";
    return;
  }

  const { error } = await supabase
    .from("community_posts")
    .insert([{ content: text }]);

  if(error){
    msg.textContent = "Error: " + error.message;
    return;
  }

  document.getElementById("postText").value = "";
  msg.textContent = "Posted!";
  loadPosts();
}

async function loadPosts(){
  const feed = document.getElementById("feed");

  const { data, error } = await supabase
    .from("community_posts")
    .select("*")
    .order("created_at", { ascending: false });

  if(error){
    feed.innerHTML = "<p>" + error.message + "</p>";
    return;
  }

  feed.innerHTML = data.map(post => `
    <div class="post">
      <div>${escapeHtml(post.content)}</div>
      <div class="small">${new Date(post.created_at).toLocaleString()}</div>
    </div>
  `).join("");
}

function escapeHtml(text){
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}

loadPosts();
</script>

<!--
Create this table in Supabase SQL:

create table community_posts (
  id bigint generated by default as identity primary key,
  content text not null,
  created_at timestamptz default now()
);

Then enable INSERT and SELECT policies as desired.
-->
</body>
</html>
